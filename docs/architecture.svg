<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ingress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="web" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="980" height="720" fill="url(#bg)"/>

  <!-- title -->
  <text x="490" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">k8s-microservices — namespace: microservices</text>
  <text x="490" y="62" text-anchor="middle" font-size="12" fill="#94a3b8">Path-routed Ingress · DNS-based service discovery · Queue-decoupled worker · Stateful data tier</text>

  <!-- cluster boundary -->
  <rect x="40" y="90" width="900" height="600" rx="14" fill="none" stroke="#334155" stroke-dasharray="6 4" stroke-width="1.5"/>
  <text x="58" y="110" font-size="11" fill="#64748b" font-weight="600" letter-spacing="1">KUBERNETES CLUSTER</text>

  <!-- tier labels -->
  <text x="62" y="160" font-size="10" fill="#475569" font-weight="700" letter-spacing="2">EDGE</text>
  <text x="62" y="270" font-size="10" fill="#475569" font-weight="700" letter-spacing="2">WEB</text>
  <text x="62" y="400" font-size="10" fill="#475569" font-weight="700" letter-spacing="2">BACKEND</text>
  <text x="62" y="560" font-size="10" fill="#475569" font-weight="700" letter-spacing="2">DATA</text>

  <!-- INGRESS -->
  <g filter="url(#shadow)">
    <rect x="380" y="140" width="220" height="60" rx="10" fill="url(#ingress)"/>
    <text x="490" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#1f1300">Ingress (nginx)</text>
    <text x="490" y="186" text-anchor="middle" font-size="11" fill="#3b2900">host: app.local</text>
  </g>

  <!-- path labels from ingress -->
  <text x="280" y="218" text-anchor="middle" font-size="11" fill="#fbbf24" font-weight="600">/ →</text>
  <text x="700" y="218" text-anchor="middle" font-size="11" fill="#fbbf24" font-weight="600">/api →</text>

  <!-- arrows ingress to frontend / api -->
  <path d="M440,200 C440,230 230,230 230,250" stroke="#cbd5e1" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <path d="M540,200 C540,230 750,230 750,250" stroke="#cbd5e1" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>

  <!-- FRONTEND -->
  <g filter="url(#shadow)">
    <rect x="120" y="250" width="220" height="80" rx="10" fill="url(#web)"/>
    <text x="230" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#062235">frontend</text>
    <text x="230" y="294" text-anchor="middle" font-size="11" fill="#0c3a55">Deployment · 2 replicas · nginx</text>
    <text x="230" y="312" text-anchor="middle" font-size="10" fill="#0c3a55" font-style="italic">ClusterIP :80</text>
  </g>

  <!-- API + sidecar -->
  <g filter="url(#shadow)">
    <rect x="640" y="250" width="220" height="100" rx="10" fill="url(#backend)"/>
    <text x="750" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#1a0a3d">api</text>
    <text x="750" y="294" text-anchor="middle" font-size="11" fill="#2a1561">Deployment · 2 replicas · FastAPI</text>
    <text x="750" y="312" text-anchor="middle" font-size="10" fill="#2a1561" font-style="italic">ClusterIP :8080  ·  initContainers</text>
    <line x1="660" y1="322" x2="840" y2="322" stroke="#1a0a3d" stroke-opacity="0.25"/>
    <text x="750" y="340" text-anchor="middle" font-size="10" fill="#1a0a3d" font-weight="600">⎘ sidecar: fluent-bit (emptyDir)</text>
  </g>

  <!-- frontend → api (intra-cluster) -->
  <path d="M340,290 L640,290" stroke="#cbd5e1" stroke-width="1.6" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text x="490" y="282" text-anchor="middle" font-size="10" fill="#94a3b8">api.microservices.svc:8080</text>

  <!-- WORKER -->
  <g filter="url(#shadow)">
    <rect x="780" y="430" width="160" height="80" rx="10" fill="url(#backend)"/>
    <text x="860" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#1a0a3d">worker</text>
    <text x="860" y="474" text-anchor="middle" font-size="11" fill="#2a1561">Deployment · 3 replicas</text>
    <text x="860" y="492" text-anchor="middle" font-size="10" fill="#2a1561" font-style="italic">no Service (queue consumer)</text>
  </g>

  <!-- REDIS -->
  <g filter="url(#shadow)">
    <rect x="380" y="430" width="220" height="80" rx="10" fill="url(#cache)"/>
    <text x="490" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#3f0314">redis</text>
    <text x="490" y="474" text-anchor="middle" font-size="11" fill="#5a0820">Deployment · queue + cache</text>
    <text x="490" y="492" text-anchor="middle" font-size="10" fill="#5a0820" font-style="italic">ClusterIP :6379  ·  PVC redis-data</text>
  </g>

  <!-- API → REDIS (LPUSH jobs) -->
  <path d="M700,360 C620,400 600,410 540,430" stroke="#fb7185" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="640" y="395" font-size="10" fill="#fb7185" font-weight="600">LPUSH jobs</text>

  <!-- REDIS → WORKER (BRPOP) -->
  <path d="M600,470 L780,470" stroke="#fb7185" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="690" y="462" text-anchor="middle" font-size="10" fill="#fb7185" font-weight="600">BRPOP</text>

  <!-- POSTGRES -->
  <g filter="url(#shadow)">
    <rect x="120" y="430" width="220" height="100" rx="10" fill="url(#data)"/>
    <text x="230" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#022c1c">postgres</text>
    <text x="230" y="474" text-anchor="middle" font-size="11" fill="#054a33">StatefulSet · 1 replica · PVC</text>
    <text x="230" y="492" text-anchor="middle" font-size="10" fill="#054a33" font-style="italic">Headless Service :5432</text>
    <text x="230" y="512" text-anchor="middle" font-size="9" fill="#054a33">postgres-0.postgres.microservices.svc</text>
  </g>

  <!-- API → POSTGRES (SELECT) -->
  <path d="M700,360 C500,400 400,410 340,430" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="450" y="395" font-size="10" fill="#34d399" font-weight="600">SELECT items</text>

  <!-- WORKER → POSTGRES (INSERT) -->
  <path d="M780,510 C580,580 380,580 280,530" stroke="#34d399" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="530" y="585" text-anchor="middle" font-size="10" fill="#34d399" font-weight="600">INSERT items (job result)</text>

  <!-- EXTERNAL: analytics RDS -->
  <g filter="url(#shadow)">
    <rect x="120" y="600" width="220" height="60" rx="10" fill="url(#external)" stroke="#475569" stroke-dasharray="4 3"/>
    <text x="230" y="624" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">analytics RDS (external)</text>
    <text x="230" y="644" text-anchor="middle" font-size="10" fill="#1e293b" font-style="italic">via ExternalName: analytics-db.microservices.svc</text>
  </g>

  <!-- API → ExternalName -->
  <path d="M640,330 C500,330 360,330 230,600" stroke="#94a3b8" stroke-width="1.4" fill="none" marker-end="url(#arrowMuted)" stroke-dasharray="3 4"/>
  <text x="370" y="555" font-size="10" fill="#94a3b8">CNAME → RDS endpoint</text>

  <!-- legend -->
  <g transform="translate(620,600)">
    <rect x="0" y="0" width="300" height="80" rx="8" fill="#0b1220" stroke="#1f2937"/>
    <text x="12" y="18" font-size="10" fill="#94a3b8" font-weight="700" letter-spacing="1">LEGEND</text>
    <line x1="12" y1="34" x2="40" y2="34" stroke="#cbd5e1" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="48" y="38" font-size="10" fill="#cbd5e1">in-cluster request (HTTP / DB / Redis)</text>
    <line x1="12" y1="54" x2="40" y2="54" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3 4" marker-end="url(#arrowMuted)"/>
    <text x="48" y="58" font-size="10" fill="#94a3b8">DNS-only (ExternalName → off-cluster)</text>
    <text x="12" y="74" font-size="9" fill="#64748b">Tier colors: blue=web · purple=backend · red=cache · green=data</text>
  </g>
</svg>
