apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: microservices
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# ExternalName service: in-cluster DNS name that resolves (via CNAME) to an
# external RDS endpoint. Apps reference analytics-db.microservices.svc.cluster.local
# and remain unaware of the actual hostname.
apiVersion: v1
kind: Service
metadata:
  name: analytics-db
  namespace: microservices
spec:
  type: ExternalName
  externalName: analytics.cluster-xyz.us-east-1.rds.amazonaws.com
  ports:
    - port: 5432
